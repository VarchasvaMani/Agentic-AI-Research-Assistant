version: "3.9"

services:
  rag-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist ChromaDB vectors across container restarts
      - chroma_data:/app/chroma_db
      # Mount sample docs so they're accessible inside the container
      - ./sample_docs:/app/sample_docs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
